<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="diamond" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M10 0 L20 10 L10 20 L0 10 Z" fill="none" stroke="rgba(200,150,50,0.5)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(255,210,120,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- fundo -->
  <rect width="200" height="200" fill="#1a1208"/>
  <!-- padrão losango -->
  <rect width="200" height="200" fill="url(#diamond)"/>
  <!-- brilho central -->
  <rect width="200" height="200" fill="url(#glow)"/>
  <!-- borda interior -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="rgba(200,150,50,0.4)" stroke-width="1" rx="2"/>
</svg>
