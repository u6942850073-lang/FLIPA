{% extends "base.html" %}
{% block title %}FLIPA{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">FLIPA</div>
        <h2>Create Account</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" required autofocus minlength="3">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autocomplete="new-password" required minlength="4">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
